name: Build and Push Docker Images

on:
  workflow_run:
    workflows:
      - Test Backend
    types:
      - completed
    branches:
      - main
      - master

jobs:
  build-and-push-docker-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      # Checkout your GitHub code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ vars.DOCKERHUB_USERNAME }} --password-stdin

      # Build and push backend image
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: ${{ vars.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: true

      # Build and push database image
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ vars.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

      # Build and push httpd image
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ vars.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: true