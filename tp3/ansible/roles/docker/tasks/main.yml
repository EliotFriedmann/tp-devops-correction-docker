---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: true

- name: Create Docker keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  notify: Restart Docker

- name: Create Python virtual environment for Docker
  ansible.builtin.command:
    cmd: python3 -m venv /opt/docker_venv
    creates: /opt/docker_venv/bin/python

- name: Install Docker Python dependencies
  ansible.builtin.pip:
    name:
      - docker==7.1.0
      - requests==2.31.0
    state: forcereinstall
    virtualenv: /opt/docker_venv

- name: Make sure Docker is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true